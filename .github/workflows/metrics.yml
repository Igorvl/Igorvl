name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_timezone: Europe/Moscow
          config_font: "-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji"
          
          # Круговая диаграмма языков (Pie Chart) с фильтром
          plugin_languages: yes
          plugin_languages_ignored: html, css, javascript, jupyter notebook, svg
          plugin_languages_limit: 4
          
          # 3D "Город" (Isometric Calendar) на полгода, чтобы скрыть пустые периоды
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
