name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_timezone: Europe/Moscow
          config_animations: no

          # ================================================================
          # Dark Barry-style theme via extras_css
          #
          # Template uses <foreignObject> + HTML, so standard CSS targets work.
          # Isocalendar SVG uses hardcoded fill attributes (e.g. fill="#ebedf0")
          # which can be overridden with CSS attribute selectors + !important.
          # ================================================================
          extras_css: |
            /* --- Canvas background (#0d1117 = GitHub dark mode) --- */
            .items-wrapper {
              background-color: #0d1117;
            }

            /* --- Text: match GitHub page font (16px system stack) --- */
            svg {
              color: #c9d1d9;
              font-size: 16px;
            }

            /* --- Section headers: GitHub blue accent (Barry-style) --- */
            h1, h2, h3 {
              color: #58a6ff;
            }

            /* --- Muted / secondary text --- */
            footer,
            .footnote,
            .h-details,
            .field.language.details small,
            .chart-bars .entry {
              color: #6e7681;
            }

            /* --- Plugin icons (octicons) --- */
            .field > svg {
              fill: #8b949e;
            }

            /* ============================================================
               Isocalendar dark mode — GitHub dark color scheme
               Source HEX values confirmed from github-metrics.svg output.
               CSS presentation attribute override requires !important.
            ============================================================ */

            /* Empty cells: #ebedf0 (light grey) → #161b22 (GitHub dark) */
            [fill="#ebedf0"] { fill: #161b22 !important; }

            /* Contribution level 1: #9be9a8 → #0e4429 */
            [fill="#9be9a8"] { fill: #0e4429 !important; }

            /* Contribution level 2: #40c463 → #006d32 */
            [fill="#40c463"] { fill: #006d32 !important; }

            /* Contribution level 3: #30a14e → #26a641 */
            [fill="#30a14e"] { fill: #26a641 !important; }

            /* Contribution level 4: #216e39 → #39d353 */
            [fill="#216e39"] { fill: #39d353 !important; }

            /* Language bar background (SVG rect with fill="white") */
            rect[fill="white"] { fill: #161b22 !important; }

          # -----------------------------------------------
          # 6-month isometric 3D calendar
          # -----------------------------------------------
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # -----------------------------------------------
          # Languages — top 4 (Python, Shell, PHP, PLpgSQL)
          # -----------------------------------------------
          plugin_languages: yes
          plugin_languages_ignored: html, css, javascript, jupyter notebook, svg
          plugin_languages_limit: 4

          # plugin_habits removed — causes "Unexpected error"
          # due to insufficient recent events for analysis.
          # Re-enable once there's more GitHub activity.
